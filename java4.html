<html>
<head>
<title>Countdown Timer</title>
<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
    background-color: #f2f2f2;
}
#timer{
    font-size: 50px;
    margin: 20px;
    color: #333;
}
button{
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>
<body>
<h2>1 Hour Countdown Timer</h2>
<div id="timer">60:00</div>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
<p id="message"></p>
<script>
let time = 3600; 
let timer;
function updateDisplay(){
let minutes = Math.floor(time / 60);
let seconds = time % 60;
seconds = seconds < 10 ? "0" + seconds : seconds;
document.getElementById("timer").innerHTML = minutes + ":" + seconds;
}
function startTimer(){
if(!timer){
timer = setInterval(function(){
if(time > 0){
time--;
updateDisplay();
}
else{
clearInterval(timer);
document.getElementById("message").innerHTML = "Time is up!";
}
},1000);}}
function pauseTimer(){
clearInterval(timer);
timer = null;}
function resetTimer(){
clearInterval(timer);
timer = null;
time = 3600;
updateDisplay();
document.getElementById("message").innerHTML = "";}
</script>
</body>
</html>
